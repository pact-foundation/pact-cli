name: Test CLI with Pact Broker

on:
  workflow_dispatch:
  # push: # setup to run post release
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
        shell: [bash]
        # include:
        #   - os: windows-latest
        #     shell: pwsh
        #   - os: windows-latest
        #     shell: cmd
      fail-fast: false
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: you54f/pact-broker-in-a-box@32b14f7a159719ef997e651d02e393349ed553ab # main
    - uses: pact-foundation/pact-cli@bc95b59508b3a6cb8403476c23e06f929bffd93e # main
 
    - name: Show help commands
      run: |
        pact --help

    - name: Run pactbroker commands
      shell: bash
      run: ./run.sh
      env:
        PACT_BROKER_BASE_URL: http://localhost:9292
