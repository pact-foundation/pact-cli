---
name: Test

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_BACKTRACE: '1'
  FORCE_COLOR: '1'
  CARGO_TERM_COLOR: always

jobs:
  complete:
    name: Test completion check
    if: always()
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - test
      - release-gate
    steps:
      - name: Failed
        if: |
          contains(fromJSON('["failure","cancelled"]'), needs.format.result) ||
          contains(fromJSON('["failure","cancelled"]'), needs.lint.result) ||
          contains(fromJSON('["failure","cancelled"]'), needs.test.result) ||
          needs.release-gate.result == 'failure' ||
          needs.release-gate.result == 'cancelled'
        run: exit 1

  release-gate:
    name: Release gate (full build + integration)
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      startsWith(github.head_ref, 'release-plz-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - name: Verify full-target build plan
        run: dist plan
      - name: Build (debug) for integration
        run: cargo build
      - name: Start Pact Broker
        uses: you54f/pact-broker-in-a-box@32b14f7a159719ef997e651d02e393349ed553ab  # main
      - name: Run CLI integration test
        run: ./run.sh
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          BIN: ./target/debug/pact

  format:
    name: Format
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  lint:
    name: Lint
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          components: clippy
      - name: Run Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595  # v2.81.11
        with:
          tool: cargo-nextest
      - name: Run tests
        run: cargo nextest run
