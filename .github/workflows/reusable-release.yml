on:
  workflow_call:
    inputs:
      version:
        description: 'Version of the release'
        required: true
        default: 'latest'
        type: string
      release_notes:
        description: 'Release notes for the version'
        default: 'Release'
        type: string
      force_release:
        description: 'force release for target from branch other than main'
        default: false
        type: boolean
jobs:
  release_workflow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # main
        with:
          path: dist
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -R dist

      - name: update cargo toml version
        if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' }}
        run: |
              awk -v ver="${{ inputs.version }}" '{
              if (!done && $0 ~ /^version = "/) {
                print "version = \"" ver "\""
                done=1
                next
              }
              print
              }' Cargo.toml > Cargo.toml.tmp && rm Cargo.toml && mv Cargo.toml.tmp Cargo.toml
              cargo update pact
      - name: "Write changelog"
        if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' }}
        run: echo "${{ inputs.release_notes }}" >> CHANGELOG.md
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          commit_message: "chore(release): v${{ inputs.version }}"
          branch: main
          file_pattern: 'Cargo.* CHANGELOG.md'
      - name: Update dev-build tag
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          git tag -d ${{ env.dev_tag }} || true
          git push origin :refs/tags/${{ env.dev_tag }} || true
          git tag ${{ env.dev_tag }}
          git push origin ${{ env.dev_tag }}
        env:
          dev_tag: vlatest
      - name: Publish archives and packages
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.dev_tag }}
          name: 'Release ${{ env.dev_tag }}'
          generate_release_notes: true
          body: ${{ inputs.release_notes }}
          files: dist/*
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          dev_tag: vlatest
      - name: Publish archives and packages
        if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ inputs.version }}
          name: 'Release v${{ inputs.version }}'
          generate_release_notes: true
          body: ${{ inputs.release_notes }}
          files: dist/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish archives and packages
        if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ inputs.version }}
          name: 'Release v${{ inputs.version }}'
          generate_release_notes: true
          body: ${{ inputs.release_notes }}
          files: dist/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-released:
    if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') }}
    needs: release_workflow
    strategy:
      matrix:
        repository: [pact-foundation/homebrew-tap]
    runs-on: ubuntu-latest
    steps:
      - name: Notify ${{ matrix.repository }} of gem release
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.GHTOKENFORRELEASEDISPATCH }}
          repository: ${{ matrix.repository }}
          event-type: pact-cli-released
          client-payload: |
              {
                "version": "${{ inputs.version }}",
                "type": "pact-cli-released"
              }
  trigger-released:
    if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') }}
    needs: notify-released
    strategy:
      matrix:
        repository: [pact-foundation/homebrew-tap]
    runs-on: ubuntu-latest
    steps:
      - name: Notify ${{ matrix.repository }} of gem release
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.GHTOKENFORRELEASEDISPATCH }}
          repository: ${{ matrix.repository }}
          event-type: pact-cli-released
          client-payload: |
              {
                "version": "${{ inputs.version }}",
                "type": "pact-cli-released"
              }

  trigger-docker:
    if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') }}
    needs: release_workflow
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docker workflow - ${{ inputs.version }}
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-docker-build
          client-payload: |
            {
              "version": "${{ inputs.version }}"
            }
      - name: Trigger docker workflow - latest
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-docker-build
          client-payload: |
            {
              "version": "latest"
            }

  trigger-cargo-publish:
    if: ${{ inputs.force_release == true || startsWith(github.ref, 'refs/tags/') }}
    needs: release_workflow
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cargo publish workflow
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-cargo-publish
          client-payload: |
            {
              "version": "${{ inputs.version }}"
            }